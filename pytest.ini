[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# -rs: list skipped tests with their reason — a skip is a decision the
# reader should see, not silence that passes for green.
addopts = -v --tb=short -rs
markers =
    live_aws: hits a real AWS sandbox account; only run by the gated nightly job, never per-PR
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
