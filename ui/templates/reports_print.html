<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wasteless FinOps Report — {{ report.period.start }} to {{ report.period.end }}</title>
<style>
    /* Standalone document: no app shell, no design tokens, so Chrome's
       paged-media pipeline renders it reliably (the full /reports page's
       fixed sidebar + overflow:clip + 100vh break the print paginator). */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #f2f2f4; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-variant-numeric: tabular-nums; -webkit-font-smoothing: antialiased; }
    .sheet { max-width: 210mm; margin: 18px auto; background: #fff; padding: 16mm 15mm; box-shadow: 0 2px 18px rgba(0,0,0,0.12); }
    .toolbar { max-width: 210mm; margin: 0 auto; display: flex; gap: 0.5rem; align-items: center; padding: 4px 2px; }
    .toolbar .sp { margin-left: auto; }
    .toolbar a, .toolbar button { font: inherit; font-size: 0.78rem; padding: 0.4rem 0.85rem; border: 1px solid #cfcfcf; background: #fff; color: #333; text-decoration: none; border-radius: 6px; cursor: pointer; }
    .toolbar button.primary { background: #15803d; border-color: #15803d; color: #fff; font-weight: 600; }

{% include "_report_document_css.html" %}

    @media print {
        @page { margin: 14mm 14mm 15mm; }
        html, body { background: #fff; }
        .toolbar { display: none !important; }
        .sheet { max-width: none; margin: 0; padding: 0; box-shadow: none; }
        .pd-section { break-inside: avoid; }
        * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
</style>
</head>
<body>
<div class="toolbar">
    <a href="/reports?g={{ report.granularity }}&at={{ report.anchor }}">&larr; Back to report</a>
    <span class="sp"></span>
    <button class="primary" onclick="window.print()">Print / Save as PDF</button>
</div>

<div class="sheet">
    {% include "_report_document.html" %}
</div>

<script>
    if (new URLSearchParams(location.search).get('auto') === '1') {
        window.addEventListener('load', () => setTimeout(() => window.print(), 250));
    }
</script>
</body>
</html>
