[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    live_aws: hits a real AWS sandbox account; only run by the gated nightly job, never per-PR
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
