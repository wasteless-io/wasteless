# Pas d'attribut `version:` : obsolete depuis Compose v2, il ne sert plus qu'a
# emettre un warning. Compose lit la version du schema depuis le binaire.
services:
  postgres:
    image: postgres:16-alpine
    container_name: wasteless-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-wasteless}
      POSTGRES_USER: ${DB_USER:-wasteless}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # start_period : le temps d'initdb (premier boot avec init.sql) n'est pas
      # compte comme un echec. retries 30 x 5s = jusqu'a 2,5 min avant unhealthy,
      # aligne sur le wait_for_postgres cote install.sh.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wasteless} -d ${DB_NAME:-wasteless}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  metabase:
    image: metabase/metabase:v0.48.0
    container_name: wasteless-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${DB_NAME:-wasteless}
      MB_DB_PORT: 5432
      MB_DB_USER: ${DB_USER:-wasteless}
      MB_DB_PASS: ${DB_PASSWORD:?DB_PASSWORD is required}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: