AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Wasteless onboarding: creates the cross-account IAM roles wasteless uses
  to analyze (read-only) and, optionally, remediate (write) cloud waste in
  this account. The read-only role only lists resources and reads usage
  metrics; it can never read the data inside them, modify anything, or
  touch IAM. The remediation role is only used for actions a human approves
  in the wasteless UI, and is optional (set CreateRemediationRole to false
  to keep wasteless in pure detection mode). Sessions are temporary (1 hour
  max) and deleting this stack revokes all access instantly. The policy
  actions are kept in sync with onboarding/policies/*.json by a unit test
  in the wasteless repository, where every permission can be audited.

Parameters:
  TrustedPrincipalArn:
    Type: String
    Default: ''
    Description: >
      ARN of the IAM principal allowed to assume the roles (the identity
      wasteless runs with, e.g. arn:aws:iam::123456789012:user/wasteless or
      a role ARN). Leave empty to trust this account's root (self-hosted
      in the same account).
  ExternalId:
    Type: String
    Default: ''
    Description: >
      Optional ExternalId the caller must present in sts:AssumeRole.
      Recommended when the trusted principal lives in another account.
  RoleNamePrefix:
    Type: String
    Default: wasteless
    Description: Prefix for the created role names (<prefix>-readonly, <prefix>-remediation).
  CreateRemediationRole:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Set to 'false' for detection-only onboarding: wasteless will analyze
      waste but will not be able to modify anything in this account.

Conditions:
  HasTrustedPrincipal: !Not [!Equals [!Ref TrustedPrincipalArn, '']]
  HasExternalId: !Not [!Equals [!Ref ExternalId, '']]
  WantRemediation: !Equals [!Ref CreateRemediationRole, 'true']

Resources:
  WastelessReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${RoleNamePrefix}-readonly'
      Description: >-
        Read-only analysis role for wasteless (cloud cost waste detection).
        Grants only Describe/Get/List calls on resource metadata, CloudWatch
        metrics and Cost Explorer: wasteless can see which resources exist
        and how much they are used, but can never read the data they
        contain, never create, modify or delete anything, and never touch
        IAM. Sessions last 1 hour max; delete this role to revoke all
        access instantly.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !If
                - HasTrustedPrincipal
                - !Ref TrustedPrincipalArn
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
            Condition: !If
              - HasExternalId
              - StringEquals:
                  sts:ExternalId: !Ref ExternalId
              - !Ref AWS::NoValue
      Policies:
        - PolicyName: wasteless-readonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WastelessReadOnly
                Effect: Allow
                Action:
                  - ce:GetCostAndUsage
                  - cloudtrail:LookupEvents
                  - cloudwatch:GetMetricStatistics
                  - ec2:DescribeAddresses
                  - ec2:DescribeImages
                  - ec2:DescribeInstances
                  - ec2:DescribeNatGateways
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSnapshots
                  - ec2:DescribeVolumes
                  - ec2:DescribeVpcs
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetHealth
                  - rds:DescribeDBInstances
                  - rds:DescribeDBSnapshots
                  - s3:GetBucketLocation
                  - s3:ListAllMyBuckets
                Resource: '*'
      Tags:
        - Key: Application
          Value: wasteless

  WastelessRemediationRole:
    Type: AWS::IAM::Role
    Condition: WantRemediation
    Properties:
      RoleName: !Sub '${RoleNamePrefix}-remediation'
      Description: >-
        Remediation role for wasteless, assumed only to execute waste
        cleanup actions approved by a human in the wasteless UI (stop an
        idle instance, delete an orphaned volume, ...). Limited to the
        listed EC2/ELB cleanup actions: no IAM access, and the only thing
        it can create is a rollback snapshot taken before destructive EBS
        actions. Sessions last 1 hour max; delete this role to revoke all
        access instantly (wasteless then falls back to detection mode).
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !If
                - HasTrustedPrincipal
                - !Ref TrustedPrincipalArn
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
            Condition: !If
              - HasExternalId
              - StringEquals:
                  sts:ExternalId: !Ref ExternalId
              - !Ref AWS::NoValue
      Policies:
        # Remediators describe resources before acting: attach read too
        - PolicyName: wasteless-readonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WastelessReadOnly
                Effect: Allow
                Action:
                  - ce:GetCostAndUsage
                  - cloudtrail:LookupEvents
                  - cloudwatch:GetMetricStatistics
                  - ec2:DescribeAddresses
                  - ec2:DescribeImages
                  - ec2:DescribeInstances
                  - ec2:DescribeNatGateways
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSnapshots
                  - ec2:DescribeVolumes
                  - ec2:DescribeVpcs
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetHealth
                  - rds:DescribeDBInstances
                  - rds:DescribeDBSnapshots
                  - s3:GetBucketLocation
                  - s3:ListAllMyBuckets
                Resource: '*'
        - PolicyName: wasteless-remediation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Ec2Remediation
                Effect: Allow
                Action:
                  - ec2:CreateSnapshot
                  - ec2:DeleteNatGateway
                  - ec2:DeleteSnapshot
                  - ec2:DeleteVolume
                  - ec2:DeregisterImage
                  - ec2:ModifyVolume
                  - ec2:ReleaseAddress
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:TerminateInstances
                Resource: '*'
              - Sid: TagRollbackSnapshots
                Effect: Allow
                Action:
                  - ec2:CreateTags
                Resource: 'arn:aws:ec2:*::snapshot/*'
                Condition:
                  StringEquals:
                    ec2:CreateAction: CreateSnapshot
              - Sid: ElbRemediation
                Effect: Allow
                Action:
                  - elasticloadbalancing:DeleteLoadBalancer
                Resource: '*'
      Tags:
        - Key: Application
          Value: wasteless

Outputs:
  ReadOnlyRoleArn:
    Description: Value for AWS_ROLE_ARN in the wasteless .env
    Value: !GetAtt WastelessReadOnlyRole.Arn
  RemediationRoleArn:
    Condition: WantRemediation
    Description: Value for AWS_WRITE_ROLE_ARN in the wasteless .env
    Value: !GetAtt WastelessRemediationRole.Arn
