name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff, black, mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            ui/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r ui/requirements.txt
          pip install ruff black mypy
      - name: ruff check
        run: ruff check src ui tests
      - name: black --check
        run: black --check src ui tests
      # Scoped to the two files that execute AWS remediation actions:
      # a type error there is the most expensive place for one to hide.
      # Broader mypy coverage is tracked separately, not a blocking gate yet.
      - name: mypy (safeguards + remediator proxy)
        run: mypy src/core/safeguards.py ui/utils/remediator.py --ignore-missing-imports --follow-imports=silent

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    # Real Postgres so tests/integration/ (test_ui_coherence.py,
    # test_db_backup_restore.py) actually run instead of skipping —
    # without this, "CI green" only proves the unit tests pass.
    # AWS/LLM integration tests still skip in CI: providing real cloud
    # credentials to CI is a deliberate decision, not a default.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wasteless
          POSTGRES_USER: wasteless
          POSTGRES_PASSWORD: wasteless_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wasteless"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: wasteless
      DB_USER: wasteless
      DB_PASSWORD: wasteless_ci
      PGPASSWORD: wasteless_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Pinned to match the postgres:16-alpine service exactly: a newer
      # psql/pg_dump client can emit settings (e.g. transaction_timeout)
      # the older server doesn't recognize, breaking restores.
      - name: Install postgresql-client-16 (psql, pg_dump)
        run: |
          # GitHub-hosted runners ship third-party apt sources (azure-cli,
          # microsoft-prod) whose signing key rotates independently of us;
          # when it's stale, `apt-get update` fails repo-wide even though
          # we only need the standard Ubuntu postgresql-client package.
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16
      - name: Apply database schema
        run: |
          psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f sql/init.sql
          psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f sql/ec2_metrics.sql
          for migration in sql/migrations/*.sql; do
            psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f "$migration"
          done
      # Coverage is informational only, not a blocking gate yet -- it rides
      # along on the same test run rather than a separate pytest invocation.
      - name: Run tests
        run: pytest -q --cov=src --cov-report=term-missing | tee coverage-report.txt
      - name: Coverage summary
        if: always()
        run: |
          {
            echo '## Coverage (src/)'
            echo '```'
            tail -20 coverage-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  ui:
    name: UI (unittest)
    runs-on: ubuntu-latest
    # Same reasoning as the backend job: several ui/tests/*.py need a real
    # Postgres (test_action_status_guards.py, test_page_truncation_totals.py,
    # test_sync_ec2_states.py) and otherwise just skip in CI.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wasteless
          POSTGRES_USER: wasteless
          POSTGRES_PASSWORD: wasteless_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wasteless"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: wasteless
      DB_USER: wasteless
      DB_PASSWORD: wasteless_ci
      PGPASSWORD: wasteless_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            ui/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r ui/requirements.txt
          pip install -e .
      # Pinned to match the postgres:16-alpine service exactly (see the
      # backend job above for why version drift breaks restores/dumps).
      - name: Install postgresql-client-16 (psql)
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16
      - name: Apply database schema
        run: |
          psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f sql/init.sql
          psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f sql/ec2_metrics.sql
          for migration in sql/migrations/*.sql; do
            psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Run tests
        working-directory: ui
        run: python run_tests.py

  smoke-collect:
    name: Smoke test (wasteless.sh collect, no AWS creds, no steampipe)
    runs-on: ubuntu-latest
    # GitHub-hosted runners don't have the steampipe CLI installed, and this
    # job deliberately doesn't set AWS_* creds -- so this exercises exactly
    # the partial-run path (steps 7-10 skipped) that used to be invisible
    # outside ~/.wasteless.log. Asserts the script doesn't crash and
    # collection_runs records full_run=false with the 4 skipped steps.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wasteless
          POSTGRES_USER: wasteless
          POSTGRES_PASSWORD: wasteless_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wasteless"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: wasteless
      DB_USER: wasteless
      DB_PASSWORD: wasteless_ci
      PGPASSWORD: wasteless_ci
      AWS_REGION: eu-west-1
      AWS_ACCOUNT_ID: "000000000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install postgresql-client-16 (psql)
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16
      - name: Apply database schema
        run: |
          psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f sql/init.sql
          psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f sql/ec2_metrics.sql
          for migration in sql/migrations/*.sql; do
            psql -h localhost -U wasteless -d wasteless -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Create venv (wasteless.sh requires ./venv to exist)
        run: |
          python3 -m venv venv
          venv/bin/pip install -q -r requirements.txt
      - name: Confirm steampipe is absent (sanity check for this job's premise)
        run: '! command -v steampipe'
      - name: Run wasteless.sh collect
        run: ./wasteless.sh collect
      - name: Assert the run was recorded as partial
        run: |
          row=$(psql -h localhost -U wasteless -d wasteless -tAc \
            "SELECT full_run, skipped_steps FROM collection_runs ORDER BY ran_at DESC LIMIT 1")
          echo "collection_runs row: $row"
          [ "$row" = 'f|{elb_unused,nat_gateway_unused,vpc_unused,ebs_gp2_migration}' ]
